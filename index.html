<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP T-Code Assistant</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #07122c 0%, #08183d 100%);
      color: #ffffff;
      min-height: 100vh;
    }

    .header {
      background: #07122c;
      padding: 24px 28px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 20px 40px;
    }

    .card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.22);
    }

    .chat-area {
      min-height: 460px;
      max-height: 62vh;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: transparent;
    }

    .message-row {
      display: flex;
      width: 100%;
    }

    .message-row.user {
      justify-content: flex-end;
    }

    .message-row.bot {
      justify-content: flex-start;
    }

    .bubble {
      max-width: 76%;
      padding: 16px 18px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 16px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .bubble.user {
      background: #2f6df6;
      color: #ffffff;
      border-bottom-right-radius: 6px;
    }

    .bubble.bot {
      background: rgba(255, 255, 255, 0.10);
      color: #ffffff;
      border-bottom-left-radius: 6px;
    }

    .meta {
      margin-top: 10px;
      font-size: 13px;
      opacity: 0.85;
    }

    .result-box {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 14px;
    }

    .result-box strong {
      display: inline-block;
      min-width: 90px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      padding: 0 24px 20px;
    }

    .chip {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
      background: rgba(47, 109, 246, 0.16);
      color: #dfe9ff;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    .chip:hover {
      transform: translateY(-1px);
      background: rgba(47, 109, 246, 0.26);
    }

    .input-bar {
      display: flex;
      gap: 14px;
      padding: 18px 20px 20px;
      background: rgba(255, 255, 255, 0.03);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .input-bar input {
      flex: 1;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(255, 255, 255, 0.08);
      color: #ffffff;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      outline: none;
    }

    .input-bar input::placeholder {
      color: rgba(255, 255, 255, 0.58);
    }

    .input-bar button {
      min-width: 130px;
      border: none;
      border-radius: 14px;
      padding: 16px 20px;
      background: #2f6df6;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .input-bar button:hover {
      transform: translateY(-1px);
      opacity: 0.95;
    }

    .input-bar button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      padding: 14px 24px 0;
      font-size: 14px;
      color: #d9e5ff;
      opacity: 0.9;
    }

    .small {
      font-size: 13px;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .bubble {
        max-width: 88%;
      }

      .input-bar {
        flex-direction: column;
      }

      .input-bar button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SAP T-Code Assistant</h1>
  </div>

  <div class="container">
    <div class="card">
      <div class="status" id="statusText">
        Connected UI. Ready to query backend.
      </div>

      <div class="chat-area" id="chatBox">
        <div class="message-row bot">
          <div class="bubble bot">
            Welcome. Ask me an SAP business task and I will suggest the relevant SAP T-code.
            <div class="meta">Examples: create purchase order, post goods movement, display sales order</div>
          </div>
        </div>
      </div>

      <div class="chips">
        <button class="chip" onclick="quickAsk('Create purchase order')">Create Purchase Order</button>
        <button class="chip" onclick="quickAsk('Post goods receipt')">Post Goods Receipt</button>
        <button class="chip" onclick="quickAsk('Create sales order')">Create Sales Order</button>
        <button class="chip" onclick="quickAsk('Display customer invoice')">Display Customer Invoice</button>
      </div>

      <div class="input-bar">
        <input
          id="userInput"
          type="text"
          placeholder="Type your SAP task here..."
          onkeydown="handleKey(event)"
        />
        <button id="sendBtn" onclick="sendMessage()">Send</button>
      </div>
    </div>
  </div>

  <script>
    // =====================================================
    // IMPORTANT: Replace with your real Render backend URL
    // Example: https://sap-tcode-backend.onrender.com
    // =====================================================
    const API_BASE_URL = "https://sap-tcode-backend.onrender.com";

    const chatBox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const statusText = document.getElementById("statusText");

    function handleKey(event) {
      if (event.key === "Enter") {
        sendMessage();
      }
    }

    function quickAsk(text) {
      userInput.value = text;
      sendMessage();
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function appendUserMessage(text) {
      const row = document.createElement("div");
      row.className = "message-row user";
      row.innerHTML = `
        <div class="bubble user">${escapeHtml(text)}</div>
      `;
      chatBox.appendChild(row);
      scrollToBottom();
    }

    function appendBotMessage(htmlContent) {
      const row = document.createElement("div");
      row.className = "message-row bot";
      row.innerHTML = `
        <div class="bubble bot">${htmlContent}</div>
      `;
      chatBox.appendChild(row);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function setBusy(isBusy) {
      sendBtn.disabled = isBusy;
      userInput.disabled = isBusy;
      statusText.textContent = isBusy
        ? "Contacting backend..."
        : "Connected UI. Ready to query backend.";
    }

    function buildResultHtml(data) {
      const mainText =
        data.answer ||
        data.speech ||
        data.message ||
        "No response returned.";

      let html = `<div>${escapeHtml(mainText)}</div>`;

      const bestMatch = data.best_match || null;
      if (bestMatch && typeof bestMatch === "object") {
        const code =
          bestMatch.tcode ||
          bestMatch.code ||
          bestMatch.t_code ||
          "";
        const description =
          bestMatch.description ||
          bestMatch.task ||
          bestMatch.text ||
          "";
        const module =
          bestMatch.module || "";
        const confidence =
          data.confidence_label || data.confidence || "";

        html += `
          <div class="result-box">
            ${code ? `<div><strong>T-code:</strong> ${escapeHtml(code)}</div>` : ""}
            ${description ? `<div><strong>Description:</strong> ${escapeHtml(description)}</div>` : ""}
            ${module ? `<div><strong>Module:</strong> ${escapeHtml(module)}</div>` : ""}
            ${confidence ? `<div><strong>Confidence:</strong> ${escapeHtml(String(confidence))}</div>` : ""}
          </div>
        `;
      }

      return html;
    }

    async function sendMessage() {
      const query = userInput.value.trim();
      if (!query) return;

      appendUserMessage(query);
      userInput.value = "";
      setBusy(true);

      try {
        const response = await fetch(`${API_BASE_URL}/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ query })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const data = await response.json();
        appendBotMessage(buildResultHtml(data));
      } catch (error) {
        console.error("Frontend -> backend call failed:", error);
        appendBotMessage(
          `Backend error. Check CORS / URL.<div class="meta small">${escapeHtml(error.message)}</div>`
        );
      } finally {
        setBusy(false);
        userInput.focus();
      }
    }

    async function pingBackend() {
      try {
        const response = await fetch(`${API_BASE_URL}/health`);
        if (!response.ok) {
          throw new Error(`Health check failed: ${response.status}`);
        }
        const data = await response.json();
        if (data.status === "healthy") {
          statusText.textContent = "Backend connected successfully.";
        } else {
          statusText.textContent = "Frontend loaded. Backend returned an unexpected health response.";
        }
      } catch (error) {
        console.error("Health check failed:", error);
        statusText.textContent = "Frontend loaded, but backend health check failed.";
      }
    }

    pingBackend();
  </script>
</body>
</html>
