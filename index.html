<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAP T-Code Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    .header {
      padding: 16px;
      border-bottom: 1px solid #334155;
      background: #111827;
    }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: 140px;
    }

    .message {
      margin-bottom: 16px;
    }

    .user {
      text-align: right;
    }

    .bot {
      text-align: left;
    }

    .bubble {
      display: inline-block;
      padding: 12px 14px;
      border-radius: 12px;
      max-width: 70%;
      white-space: pre-wrap;
    }

    .user .bubble {
      background: #2563eb;
    }

    .bot .bubble {
      background: #1f2937;
    }

    .sap-badge {
      display: inline-block;
      background: black;
      color: #22c55e;
      border: 1px solid #374151;
      padding: 6px 10px;
      border-radius: 6px;
      font-weight: bold;
      margin-top: 6px;
    }

    .copy-btn {
      margin-top: 6px;
      background: #16a34a;
      border: none;
      color: white;
      padding: 5px 8px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }

    .input-box {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      padding: 12px;
      background: #111827;
      border-top: 1px solid #334155;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 10px;
      border-radius: 8px;
    }

    button {
      margin-left: 8px;
      padding: 10px 14px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="header">
    <b>SAP T-Code Assistant</b>
  </div>

  <div id="chat" class="chat"></div>

  <div class="input-box">
    <textarea id="msg" rows="1" placeholder="Ask SAP question..."></textarea>
    <button onclick="send()">Send</button>
  </div>

  <script>
    // 🔴 IMPORTANT: Replace with your Render backend URL
    const API_URL = "https://sap-tcode-backend.onrender.com/chat/search-tcode";

    function addMessage(text, role) {
      const chat = document.getElementById("chat");

      const div = document.createElement("div");
      div.className = "message " + role;

      const bubble = document.createElement("div");
      bubble.className = "bubble";

      if (role === "bot" && text.includes("SAP T-CODE")) {
        const lines = text.split("\n");
        let tcode = "";
        let cleaned = [];

        for (let i = 0; i < lines.length; i++) {
          let line = lines[i].trim();

          if (!line) continue;

          if (line.includes("SAP T-CODE") && lines[i + 1]) {
            tcode = lines[i + 1].trim();
            i++;
            continue;
          }

          if (line.includes("━━")) continue;
          if (line.toLowerCase().startsWith("confidence")) continue;
          if (line.toLowerCase().startsWith("module")) continue;

          cleaned.push(line);
        }

        if (tcode) {
          const badge = document.createElement("div");
          badge.className = "sap-badge";
          badge.innerText = tcode;
          bubble.appendChild(badge);

          const btn = document.createElement("button");
          btn.className = "copy-btn";
          btn.innerText = "Copy";

          btn.onclick = () => {
            navigator.clipboard.writeText(tcode);
            btn.innerText = "Copied!";
            setTimeout(() => btn.innerText = "Copy", 1500);
          };

          bubble.appendChild(document.createElement("br"));
          bubble.appendChild(btn);
        }

        const textDiv = document.createElement("div");
        textDiv.innerText = cleaned.join("\n");
        bubble.appendChild(textDiv);

      } else {
        bubble.innerText = text;
      }

      div.appendChild(bubble);
      chat.appendChild(div);

      chat.scrollTop = chat.scrollHeight;
    }

    async function send() {
      const input = document.getElementById("msg");
      const message = input.value.trim();

      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      try {
        const res = await fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_id: "web",
            message: message
          })
        });

        const data = await res.json();
        addMessage(data.reply || "No response", "bot");

      } catch (e) {
        addMessage("Backend error. Check CORS / URL.", "bot");
      }
    }
  </script>

</body>
</html>
