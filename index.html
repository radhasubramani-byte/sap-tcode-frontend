<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SAP T-Code Assistant</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1b3b;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 26px;
      font-weight: bold;
      background: #07132b;
    }

    .status {
      padding: 10px 20px;
      color: #a0c4ff;
    }

    .container {
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }

    .chat-box {
      background: #1c2c4d;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .result-card {
      background: #2b3d5f;
      padding: 20px;
      border-radius: 12px;
      margin-top: 15px;
    }

    .label {
      font-weight: bold;
      margin-top: 10px;
    }

    .buttons {
      margin: 15px 0;
    }

    button {
      margin: 5px;
      padding: 10px 18px;
      border: none;
      border-radius: 20px;
      background: #3b6ef5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2f5de0;
    }

    .input-area {
      display: flex;
      margin-top: 20px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 20px;
      border: none;
      outline: none;
    }

    .send-btn {
      margin-left: 10px;
      padding: 12px 20px;
      border-radius: 20px;
      border: none;
      background: #3b6ef5;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>SAP T-Code Assistant</header>

<div class="status">Connected UI. Ready to query backend.</div>

<div class="container">

  <div id="chatArea"></div>

  <div class="buttons">
    <button onclick="sendQuery('create purchase order')">Create Purchase Order</button>
    <button onclick="sendQuery('post goods receipt')">Post Goods Receipt</button>
    <button onclick="sendQuery('create sales order')">Create Sales Order</button>
    <button onclick="sendQuery('display customer invoice')">Display Customer Invoice</button>
  </div>

  <div class="input-area">
    <input id="userInput" placeholder="Type your SAP task here..." />
    <button class="send-btn" onclick="handleSend()">Send</button>
  </div>

</div>

<script>
const API_URL = "https://sap-tcode-backend.onrender.com/chat";

async function sendQuery(query) {
  const chatArea = document.getElementById("chatArea");

  // Show user query
  chatArea.innerHTML += `
    <div class="chat-box">
      <b>You:</b> ${query}
    </div>
  `;

  try {
    const response = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ query: query })
    });

    const data = await response.json();

    // Build result UI (NO CONFIDENCE)
    let html = `
      <div class="chat-box">
        ${data.answer || "No response"}
        
        <div class="result-card">
          <div class="label">T-code:</div>
          ${data.best_match?.tcode || "-"}

          <div class="label">Description:</div>
          ${data.best_match?.description || "-"}

          <div class="label">Module:</div>
          ${data.best_match?.module || "-"}
        </div>
      </div>
    `;

    chatArea.innerHTML += html;

  } catch (error) {
    chatArea.innerHTML += `
      <div class="chat-box">
        ❌ Error connecting to backend
      </div>
    `;
  }

  chatArea.scrollTop = chatArea.scrollHeight;
}

function handleSend() {
  const input = document.getElementById("userInput");
  const query = input.value.trim();

  if (!query) return;

  sendQuery(query);
  input.value = "";
}
</script>

</body>
</html>
